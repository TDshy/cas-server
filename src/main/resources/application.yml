#
# CAS Server 7.x Configuration
# For Tomcat 10 + JDK 17 + Spring 6
#

server:
  servlet:
    context-path: /cas
  port: 8443
  ssl:
    enabled: true
    key-store: file:/etc/cas/thekeystore
    key-store-password: changeit
    key-password: changeit
  tomcat:
    basedir: build/tomcat
    uri-encoding: UTF-8

# CAS Server Settings
cas:
  server:
    name: https://localhost:8443
    prefix: https://localhost:8443/cas

  # Service Registry (In-Memory via JSON)
  service-registry:
    json:
      location: classpath:/services

  # Ticket Registry (In-Memory - default when cas-server-support-default-ticket-registry is on classpath)

  # Druid 数据源配置
  datasource:
    url: jdbc:mariadb://shuheyu.cn:3306/ruoyi?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
    username: ssm
    password: Ssm@12345678
    driver-class-name: org.mariadb.jdbc.Driver
    initial-size: 2
    min-idle: 2
    max-active: 5
    max-wait: 30000
    test-while-idle: true
    test-on-borrow: false
    test-on-return: false
    validation-query: SELECT 1

  # Druid JDBC Authentication (使用自定义 Druid 数据源)
  authn:
    druid:
      enabled: true
      name: DruidJdbcAuthenticationHandler
      order: 0
      sql: SELECT password, status, del_flag FROM sys_user WHERE user_name = ? AND status = '0' AND del_flag = '0'
      field-password: password
      field-disabled: status
      field-expired: del_flag

  # Logout Settings
  logout:
    follow-service-redirects: true
    redirect-parameter: service


  # Theme Configuration
  theme:
    default-theme-name: cas-theme


# Spring Configuration
spring:
  application:
    name: CAS Server
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false
    mode: HTML
  
  # 显式扫描自定义组件
  main:
    allow-bean-definition-overriding: true

  # Note: Main DataSource removed - only authn.jdbc uses database now

# Logging
logging:
  level:
    org.apereo.cas: DEBUG
    org.springframework.web: DEBUG
    org.springframework.boot: DEBUG
    org.hibernate.SQL: DEBUG
    root: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: E:/Tomcat/apache-tomcat-10.1.33/logs/cas-debug.log
    max-size: 100MB
    max-history: 10

# Management Endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      enabled: true
      show-details: never

