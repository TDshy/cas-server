<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自定义登录 - CAS Server</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-header h1 {
            color: #e74c3c;
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        
        .custom-badge {
            background: #e74c3c;
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            display: inline-block;
            margin-bottom: 10px;
        }
        
        .login-header p {
            color: #666;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-size: 14px;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e1e1;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
        
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <span class="custom-badge">自定义页面</span>
            <h1>欢迎登录</h1>
            <p>CAS 单点登录系统</p>
        </div>
        
        <div id="errorMsg" class="error-message" th:class="${errorMessage} ? 'error-message show' : 'error-message'" 
             th:text="${errorMessage}">
        </div>
        
        <form method="post" id="fm1" th:action="@{/login}">
            <input type="hidden" name="execution" th:value="${flowExecutionKey}"/>
            <input type="hidden" name="_eventId" value="submit"/>
            
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" placeholder="请输入用户名" required autofocus>
            </div>
            
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="请输入密码" required>
            </div>
            
            <button type="submit" class="btn-login">登 录</button>
        </form>
        
        <div class="footer">
            <p>© 2026 CAS Server. All rights reserved.</p>
        </div>
    </div>
    
    <script th:inline="javascript">
        // 自动登录功能：从 Session 检查是否需要自动登录
        (function() {
            console.log('[Auto Login] Checking session...');
            
            // 从后端获取 Session 中的凭证和自动登录标记
            fetch('/cas_server_war_exploded/api/public/session-credentials')
                .then(response => response.json())
                .then(data => {
                    if (data.autoLogin === 'true' && data.username && data.password) {
                        console.log('[Auto Login] Enabled, auto filling credentials...');
                        
                        // 显示自动登录提示
                        document.querySelector('.login-header h1').innerText = '正在自动登录...';
                        document.querySelector('.login-header p').innerText = '请稍候';
                        
                        // 自动填充用户名和密码
                        document.getElementById('username').value = data.username;
                        document.getElementById('password').value = data.password;
                        
                        console.log('[Auto Login] Form filled from session, submitting...');
                        document.getElementById('fm1').submit();
                    } else {
                        console.log('[Auto Login] Not enabled or no credentials');
                    }
                })
                .catch(error => {
                    console.error('[Auto Login] Error:', error);
                });
        })();
    </script>
</body>
</html>
